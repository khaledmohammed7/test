<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#060a06" />
  <title>Falla7 — Capstone Engineering Toolkit</title>
  <meta name="description" content="Generate Arduino code, wiring diagrams, AI guidance and EGP budgets for your STEM Capstone 2025-2026 project." />
  <meta property="og:title" content="Falla7 — Capstone Engineering Toolkit" />
  <meta property="og:description" content="Arduino code generator + AI + wiring diagrams for STEM Capstone Egypt 2025-2026" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="author" content="Khaled Mohammed — STEM ALEX S27" />

  <!-- ── Favicon (inline SVG) ──────────────────────────────────── -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230d3d0d'/><text y='.9em' font-size='72' x='12'>🌱</text></svg>" />

  <!-- ── Google Fonts ──────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet" />

  <!-- ── Base Styles ───────────────────────────────────────────── -->
  <link rel="stylesheet" href="styles.css" />

  <!-- ── React 18 + Babel (CDN) ────────────────────────────────── -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body>

  <!-- ── App Root ──────────────────────────────────────────────── -->
  <div id="root"></div>

  <!-- ── Loading Screen (shown until React mounts) ────────────── -->
  <div id="falla7-loader" style="
    position:fixed;inset:0;background:#060a06;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:9999;font-family:'Outfit',sans-serif;transition:opacity .4s ease;
  ">
    <div style="font-size:52px;margin-bottom:16px;animation:ldr-float 2s ease-in-out infinite;">🌱</div>
    <div style="font-size:22px;font-weight:800;color:#81c784;letter-spacing:2px;margin-bottom:6px;">Falla7</div>
    <div style="font-size:13px;color:#4a7a4a;letter-spacing:1px;margin-bottom:32px;">فلاح — Capstone Toolkit</div>
    <div style="display:flex;gap:8px;">
      <div style="width:8px;height:8px;border-radius:50%;background:#4caf50;animation:ldr-dot 1.2s ease-in-out infinite 0s;"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#4caf50;animation:ldr-dot 1.2s ease-in-out infinite .2s;"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#4caf50;animation:ldr-dot 1.2s ease-in-out infinite .4s;"></div>
    </div>
    <style>
      @keyframes ldr-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes ldr-dot { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }
    </style>
  </div>
  <script>
    // Remove loader once React has painted the app
    (function() {
      var loader = document.getElementById('falla7-loader');
      var observer = new MutationObserver(function() {
        if (document.getElementById('root').children.length > 0) {
          loader.style.opacity = '0';
          setTimeout(function(){ loader.style.display = 'none'; }, 420);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      // Hard fallback — remove after 8s regardless
      setTimeout(function(){
        loader.style.opacity = '0';
        setTimeout(function(){ loader.style.display = 'none'; }, 420);
      }, 8000);
    })();
  </script>

  <!-- ── Config (API keys & app settings) ─────────────────────── -->
  <script src="config.js"></script>

  <!-- ── React Application ─────────────────────────────────────── -->
  <script type="text/babel" src="app.js" data-presets="react"></script>

  <!-- ── Vercel Analytics ──────────────────────────────────────── -->
  <script defer src="/_vercel/insights/script.js"></script>

</body>
</html>

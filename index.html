<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#070a10" />
  <title>Falla7 — Capstone Engineering Toolkit</title>
  <meta name="description" content="Generate Arduino code, wiring diagrams, AI guidance and EGP budgets for your STEM Capstone 2025-2026 project." />
  <meta property="og:title" content="Falla7 — Capstone Engineering Toolkit" />
  <meta property="og:description" content="Arduino code generator + AI + wiring diagrams for STEM Capstone Egypt 2025-2026" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="author" content="Khaled Mohammed — STEM ALEX S27" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a1628'/><text y='.92em' font-size='66' x='16'>⚡</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <!-- ── Loading Screen ── -->
  <div id="falla7-loader" style="position:fixed;inset:0;background:#070a10;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease;">

    <svg width="200" height="160" viewBox="0 0 200 160" style="margin-bottom:28px;">
      <!-- grid -->
      <g fill="#111c2e" opacity=".8">
        <circle cx="20" cy="20" r="2"/><circle cx="60" cy="20" r="2"/><circle cx="100" cy="20" r="2"/><circle cx="140" cy="20" r="2"/><circle cx="180" cy="20" r="2"/>
        <circle cx="20" cy="60" r="2"/><circle cx="60" cy="60" r="2"/><circle cx="100" cy="60" r="2"/><circle cx="140" cy="60" r="2"/><circle cx="180" cy="60" r="2"/>
        <circle cx="20" cy="100" r="2"/><circle cx="60" cy="100" r="2"/><circle cx="100" cy="100" r="2"/><circle cx="140" cy="100" r="2"/><circle cx="180" cy="100" r="2"/>
        <circle cx="20" cy="140" r="2"/><circle cx="60" cy="140" r="2"/><circle cx="100" cy="140" r="2"/><circle cx="140" cy="140" r="2"/><circle cx="180" cy="140" r="2"/>
      </g>
      <!-- static traces -->
      <g fill="none" stroke="#1a2d4a" stroke-width="1.5" stroke-linecap="round">
        <polyline points="20,20 60,20 60,60"/><polyline points="180,20 140,20 140,60 100,60"/>
        <polyline points="20,100 60,100 60,140 100,140"/><polyline points="180,100 140,100 140,140"/>
        <polyline points="60,140 60,155 180,155 180,100"/>
      </g>
      <!-- animated trace 1 -->
      <polyline points="20,20 60,20 60,60 100,60 100,100 140,100 140,140 180,140"
        fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round"
        stroke-dasharray="300" stroke-dashoffset="300"
        style="animation:ldr-trace 2s ease-in-out infinite;">
      </polyline>
      <!-- animated trace 2 -->
      <polyline points="180,20 140,20 140,60 100,60 100,100 60,100 60,140 20,140"
        fill="none" stroke="rgba(245,166,35,.45)" stroke-width="1.5" stroke-linecap="round"
        stroke-dasharray="300" stroke-dashoffset="300"
        style="animation:ldr-trace 2s ease-in-out infinite .7s;">
      </polyline>
      <!-- pads -->
      <g fill="none" stroke="#f5a623" stroke-width="1.5">
        <circle cx="60"  cy="60"  r="5" style="animation:ldr-pad 2s infinite 0s"/>
        <circle cx="100" cy="100" r="5" style="animation:ldr-pad 2s infinite .4s"/>
        <circle cx="140" cy="100" r="5" style="animation:ldr-pad 2s infinite .8s"/>
        <circle cx="100" cy="60"  r="5" style="animation:ldr-pad 2s infinite 1.1s"/>
      </g>
      <!-- chip -->
      <rect x="80" y="82" width="60" height="36" rx="5" fill="#070a10" stroke="rgba(245,166,35,.8)" stroke-width="1.5"/>
      <text x="110" y="97" text-anchor="middle" font-size="8" font-weight="700" fill="#f5a623" font-family="'IBM Plex Mono',monospace">FALLA7</text>
      <text x="110" y="110" text-anchor="middle" font-size="6" fill="rgba(245,166,35,.5)" font-family="'IBM Plex Mono',monospace">v2.1.0</text>
      <g stroke="rgba(245,166,35,.6)" stroke-width="1.2">
        <line x1="80" y1="92" x2="72" y2="92"/><line x1="80" y1="100" x2="72" y2="100"/><line x1="80" y1="108" x2="72" y2="108"/>
        <line x1="140" y1="92" x2="148" y2="92"/><line x1="140" y1="100" x2="148" y2="100"/><line x1="140" y1="108" x2="148" y2="108"/>
      </g>
      <style>
        @keyframes ldr-trace { 0%{stroke-dashoffset:300;opacity:0} 10%{opacity:1} 70%{stroke-dashoffset:0;opacity:1} 100%{stroke-dashoffset:0;opacity:0} }
        @keyframes ldr-pad   { 0%,100%{opacity:.2;r:4} 50%{opacity:1;r:6} }
      </style>
    </svg>

    <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;color:#f5a623;margin-bottom:6px;">FALLA7</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(245,166,35,.4);letter-spacing:3px;margin-bottom:32px;">LOADING...</div>

    <div style="display:flex;gap:7px;">
      <div style="width:7px;height:7px;border-radius:50%;background:#f5a623;animation:ldr-dot 1.2s ease-in-out infinite 0s;"></div>
      <div style="width:7px;height:7px;border-radius:50%;background:#f5a623;animation:ldr-dot 1.2s ease-in-out infinite .2s;"></div>
      <div style="width:7px;height:7px;border-radius:50%;background:#f5a623;animation:ldr-dot 1.2s ease-in-out infinite .4s;"></div>
    </div>
    <style>
      @keyframes ldr-dot { 0%,80%,100%{transform:scale(.5);opacity:.25} 40%{transform:scale(1.1);opacity:1} }
    </style>
  </div>

  <script>
    (function() {
      var loader = document.getElementById('falla7-loader');
      var observer = new MutationObserver(function() {
        if (document.getElementById('root').children.length > 0) {
          loader.style.opacity = '0';
          setTimeout(function(){ loader.style.display = 'none'; }, 450);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      setTimeout(function(){ loader.style.opacity='0'; setTimeout(function(){ loader.style.display='none'; }, 450); }, 8000);
    })();
  </script>

  <script src="config.js"></script>
  <script type="text/babel" src="app.js" data-presets="react"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
